<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Twitch Toggle Video Quality Options</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        font: 14px/1.4 sans-serif;
        color: #111827;
        background: #f9fafb;
      }

      main {
        max-width: 520px;
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 20px;
      }

      h1 {
        margin: 0 0 16px;
        font-size: 20px;
      }

      .field {
        display: grid;
        gap: 8px;
        margin-bottom: 16px;
      }

      label {
        font-weight: 600;
      }

      select,
      button {
        font: inherit;
      }

      select {
        padding: 8px 10px;
      }

      .checkbox {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .checkbox label {
        font-weight: 400;
      }

      button {
        padding: 8px 14px;
        border: 0;
        border-radius: 8px;
        cursor: pointer;
        background: #2563eb;
        color: #fff;
      }

      #status {
        margin-top: 12px;
        min-height: 20px;
        color: #065f46;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Twitch Toggle Video Quality</h1>

      <div class="field">
        <div class="checkbox">
          <input id="muteOnLow" type="checkbox">
          <label for="muteOnLow">Mute when switching to low quality</label>
        </div>
      </div>

      <div class="field">
        <label for="preferredHigh">Preferred high resolution</label>
        <input id="preferredHigh" type="number" min="1" step="1" placeholder="1080">
        <div>Leave empty to always use the highest available quality.</div>
      </div>

      <div class="field">
        <label for="muteTarget">Mute target</label>
        <select id="muteTarget">
          <option value="tab">Browser tab</option>
          <option value="video">Twitch player</option>
        </select>
      </div>

      <div class="field">
        <div class="checkbox">
          <input id="persistSelection" type="checkbox">
          <label for="persistSelection">Persist quality and mute state across reloads</label>
        </div>
      </div>

      <div class="field">
        <div class="checkbox">
          <input id="forceUnmuteBothOnHigh" type="checkbox">
          <label for="forceUnmuteBothOnHigh">When switching back to high quality, always unmute both tab and video</label>
        </div>
      </div>

      <button id="save" type="button">Save</button>
      <div id="status"></div>
    </main>

    <script src="options.js"></script>
  </body>
</html>
